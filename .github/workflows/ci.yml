name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workflow-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run tests
        run: make test

      - name: Verify workflow pack
        run: python3 scripts/verify_pack.py --json

      - name: Check environment inventory
        run: python3 scripts/check_env.py --json
